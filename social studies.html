<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 國小社會樂學網</title>
    <style>
        /* ================= CSS 樣式區 ================= */
        :root {
            --primary: #4A90E2;
            --secondary: #F39C12;
            --bg-color: #F9F9FB;
            --text-color: #333;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', '微軟正黑體', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* 1. 頂部固定導覽列 (Sticky Nav) */
        header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--primary), #8E44AD);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.5rem; }

        .nav-controls select {
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            font-size: 1rem;
            margin-left: 10px;
            font-weight: bold;
            cursor: pointer;
            background-color: white;
            color: var(--primary);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
        }

        /* 內容容器 */
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .section-title {
            border-left: 5px solid var(--secondary);
            padding-left: 10px;
            color: var(--primary);
        }

        /* 2. 互動圖文微課程區 */
        .lesson-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
        }

        .tts-btn {
            background-color: #E8F8F5;
            border: 2px solid #1ABC9C;
            color: #16A085;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }
        .tts-btn:hover { background-color: #1ABC9C; color: white; }
        .tts-btn.playing { background-color: var(--secondary); border-color: #D68910; color: white; }

        .keyword {
            background-color: #FFF3CD;
            color: #856404;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            border-bottom: 2px dashed #FFC107;
        }

        .hover-reveal {
            background-color: #BDC3C7;
            color: transparent;
            border-radius: 6px;
            padding: 2px 10px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .hover-reveal:hover, .hover-reveal.revealed {
            background-color: #D4EDDA;
            color: #155724;
        }

        /* 純代碼資訊圖卡 (Infographic) */
        .infographic {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        .info-box {
            flex: 1;
            min-width: 150px;
            background: #F4F6F7;
            border: 2px solid #D5D8DC;
            border-radius: 10px;
            text-align: center;
            padding: 15px;
            font-size: 1.1rem;
            position: relative;
        }
        .info-box.vs::after {
            content: "VS";
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--secondary);
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            line-height: 35px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 1;
        }
        .info-box:last-child::after { display: none; }
        .info-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        .think-box {
            background-color: #FDEDEC;
            border-left: 5px solid #E74C3C;
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-top: 15px;
        }

        /* 3. 隨堂挑戰 (Quiz) */
        .quiz-container { margin-top: 40px; }
        .question-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid var(--secondary);
        }
        .options { display: grid; gap: 10px; margin-top: 15px; }
        .option-label {
            display: flex;
            align-items: center;
            background: #F8F9F9;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .option-label:hover { border-color: var(--primary); background: #EBF5FB; }
        .option-label input { margin-right: 10px; cursor: pointer; }
        
        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }
        .feedback.correct { background: #D4EDDA; color: #155724; display: block; }
        .feedback.wrong { background: #F8D7DA; color: #721C24; display: block; }

        .action-btns { text-align: center; margin: 30px 0; }
        .btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-submit { background-color: var(--primary); color: white; }
        .btn-reload { background-color: #95A5A6; color: white; margin-left: 10px; }
        .btn-clear { background-color: #E74C3C; color: white; }

        /* 4. 錯題區 (Mistakes) */
        .mistake-card {
            background: #FEF9E7;
            border-left: 5px solid #F1C40F;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }
        .btn-learned {
            background-color: #2ECC71;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌟 國小社會樂學網</h1>
        <div class="nav-controls">
            <select id="gradeSelect">
                <option value="grade3_term2">三年級 (下)</option>
            </select>
            <select id="unitSelect">
                </select>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">📖 互動微課程</h2>
        <div id="lessonArea"></div>

        <h2 class="section-title">🎮 單元總結隨堂挑戰</h2>
        <div id="quizArea"></div>
        <div class="action-btns">
            <button class="btn btn-submit" onclick="checkAnswers()">🚀 送出答案</button>
            <button class="btn btn-reload" onclick="reloadQuiz()">🔄 重新隨機出題</button>
        </div>

        <div class="action-btns" style="text-align: right; margin-top: -50px;">
            <button class="btn btn-clear" style="padding: 8px 15px; font-size: 0.9rem;" onclick="clearMistakes()">🗑️ 清空錯題</button>
        </div>
        <div id="mistakesArea"></div>
    </div>

    <script>
        /* ================= MVC: Model (資料層) ================= */
        // 為確保效能與程式碼完整性，完整實作第一單元15題，其餘單元配置結構與部分題目供擴充
        const knowledgeBase = {
            grade3_term2: {
                unit1: {
                    title: "第一單元：生活理財",
                    sections: [
                        {
                            title: "第1課：理性消費你我他",
                            content: `我們在生活中會買很多東西，這些東西可以分為<span class="keyword">需要</span>和<span class="keyword">想要</span>。「需要」是維持生活所必須的；「想要」是為了滿足個人的欲望。理性消費就是買東西前先想清楚！`,
                            infographic: `
                                <div class="infographic">
                                    <div class="info-box vs">
                                        <span class="info-icon">🍞</span>
                                        <strong>「需要」的物品</strong><br><small>沒有它會影響生活</small><br>例如：便當、水壺
                                    </div>
                                    <div class="info-box">
                                        <span class="info-icon">🎮</span>
                                        <strong>「想要」的物品</strong><br><small>有了它會很開心</small><br>例如：最新玩具、飲料
                                    </div>
                                </div>
                            `,
                            thinkBox: `🤔 腦力激盪：小明肚子餓了，他「需要」買什麼？「想要」買什麼？<br>💡 解答：<span class="hover-reveal">他「需要」買健康的便當吃飽，他「想要」買昂貴的巧克力冰淇淋。</span>`
                        },
                        {
                            title: "第2課：儲蓄為理財之本",
                            content: `<span class="keyword">儲蓄</span>就是把剩下的錢存起來。養成儲蓄的好習慣，可以應付突發狀況，也能達成未來的夢想。我們可以透過<span class="keyword">記帳</span>來了解自己的金錢花在哪裡。`,
                            infographic: `
                                <div class="infographic">
                                    <div class="info-box" style="background:#E8F8F5">
                                        <span class="info-icon">📝</span>
                                        <strong>記帳三步驟</strong>
                                        <div style="text-align:left; margin-top:10px; font-size:0.9rem;">
                                            1️⃣ 寫下日期與項目<br>
                                            2️⃣ 記錄收入與支出<br>
                                            3️⃣ 計算剩下的結餘
                                        </div>
                                    </div>
                                </div>
                            `,
                            thinkBox: `🤔 腦力激盪：為什麼要記帳呢？<br>💡 解答：<span class="hover-reveal">因為可以知道錢花去哪裡，檢討自己是不是買了太多「想要」的東西！</span>`
                        }
                    ],
                    questions: [
                        { id: "u1_q1", text: "下列哪一個物品屬於維持生活「需要」的東西？", options: ["最新款的遊戲機", "每天喝的水", "遊樂園的門票", "好吃的巧克力"], answer: 1, explanation: "水是維持生命所必需的，屬於「需要」；其他三項都是為了滿足欲望的「想要」。" },
                        { id: "u1_q2", text: "買東西前，我們應該優先購買哪一種物品？", options: ["想要的", "需要的", "包裝漂亮的", "同學都有的"], answer: 1, explanation: "理性消費的第一步是先滿足生活「需要」，再考慮「想要」。" },
                        { id: "u1_q3", text: "小華把這個月剩下的零用錢存進小豬撲滿裡，這個行為稱為什麼？", options: ["記帳", "消費", "儲蓄", "投資"], answer: 2, explanation: "把剩下的錢存起來以備不時之需，這個行為叫做「儲蓄」。" },
                        { id: "u1_q4", text: "「記帳」最主要的好處是什麼？", options: ["可以跟父母要更多錢", "了解自己的金錢流向", "能馬上買到想要的玩具", "讓錢自動變多"], answer: 1, explanation: "記帳可以幫我們清楚記錄收入和支出，了解錢花在哪裡。" },
                        { id: "u1_q5", text: "下列哪一種消費行為最符合「理性消費」？", options: ["看到喜歡的就買", "買東西前先列出購物清單", "花光所有的零用錢", "只要特價就全部買回家"], answer: 1, explanation: "購物前列出清單，可以避免衝動購物，是理性消費的表現。" },
                        { id: "u1_q6", text: "小美的鉛筆盒壞了不能用，她去文具店買了一個新的。請問這個新鉛筆盒是？", options: ["需要", "想要", "浪費", "儲蓄"], answer: 0, explanation: "因為舊的壞了影響學習，所以買新鉛筆盒是學習的「需要」。" },
                        { id: "u1_q7", text: "記帳的時候，如果阿公給了你 100 元，這筆錢應該記在？", options: ["支出", "收入", "結餘", "想要"], answer: 1, explanation: "別人給予或是自己賺到的錢，都屬於「收入」。" },
                        { id: "u1_q8", text: "如果我們想要買一個很貴的腳踏車，最好的方法是？", options: ["吵著要爸媽買", "去跟同學借錢", "訂定目標並開始儲蓄", "放棄永遠不要買"], answer: 2, explanation: "透過計畫性的儲蓄，可以慢慢累積金錢達成夢想。" },
                        { id: "u1_q9", text: "天氣變冷了，小光買了一件保暖的外套。請問這件外套是？", options: ["需要", "想要", "浪費", "借來的"], answer: 0, explanation: "為了保暖不感冒，外套是生活上的「需要」。" },
                        { id: "u1_q10", text: "下列哪一個不是我們儲蓄的目的？", options: ["為了買未來的夢想物品", "應付突然生病看醫生的錢", "為了每天買很多零食吃", "為了未來學習的基金"], answer: 2, explanation: "每天買零食花掉錢是消費，不是儲蓄的目的。" },
                        { id: "u1_q11", text: "在記帳本中，「結餘」的意思是什麼？", options: ["花掉的錢", "得到的錢", "收入減掉支出剩下的錢", "想要買的東西的價錢"], answer: 2, explanation: "結餘 = 收入 - 支出，代表你現在手邊還剩下的錢。" },
                        { id: "u1_q12", text: "逛超市時，遇到「買一送一」的促銷，我們應該怎麼做？", options: ["不管需不需要都先買", "先想清楚家裡有沒有需要", "全部買下來再丟掉", "把錢全部花光"], answer: 1, explanation: "遇到促銷也要保持冷靜，評估是否真正「需要」才不會浪費。" },
                        { id: "u1_q13", text: "小亮這個月的零用錢有 500 元，他花了 300 元買文具和點心，請問他的結餘是多少？", options: ["800元", "300元", "200元", "500元"], answer: 2, explanation: "500(收入) - 300(支出) = 200(結餘)。" },
                        { id: "u1_q14", text: "當「想要」的東西很多，但錢不夠時，應該怎麼辦？", options: ["偷拿別人的錢", "分出輕重緩急，先買最重要的", "大哭大鬧", "跟老闆說賒帳"], answer: 1, explanation: "資源有限時，要學會排序，選擇最重要或最需要的優先。" },
                        { id: "u1_q15", text: "下列哪一種是幫助我們控制花費的好工具？", options: ["電視", "記帳本", "故事書", "電動玩具"], answer: 1, explanation: "記帳本可以幫助我們追蹤金錢流向，控制花費。" }
                    ]
                },
                unit2: {

                    sections: [
                        {
                            title: "第1課：認識居住的地方",
                            content: `我們居住的地方包含了<span class="keyword">自然環境</span>（如地形、氣候、河川）與<span class="keyword">人文環境</span>（如房屋、道路、商店）。了解家鄉的環境，能幫助我們更愛護這片土地。`,
                            infographic: `<div class="infographic"><div class="info-box"><span class="info-icon">⛰️</span><strong>自然環境</strong><br>大自然原有的事物</div><div class="info-box"><span class="info-icon">🏫</span><strong>人文環境</strong><br>人類建造的事物</div></div>`,
                            thinkBox: `🤔 腦力激盪：學校旁邊的「公園」是自然還是人文環境？<br>💡 解答：<span class="hover-reveal">它是人類規劃建造的，所以屬於「人文環境」喔！</span>`

                        thinkBox: `🤔 腦力激盪：「竹山」這個地名，你猜是因為什麼命名的？<br>💡 解答：<span class="hover-reveal">因為以前那裡長滿了竹子，是依據「植物」命名的！</span>`

                    questions: [

                    questions: [

                    ]
                },
                unit5: {
                    title: "第五單元：地方生活",
                    sections: [{
                        title: "第1課：敦親睦鄰",
                        content: `住在同一個社區的人就是<span class="keyword">鄰居</span>。大家平時互相幫助、打招呼，這就是「敦親睦鄰」。社區裡還有許多<span class="keyword">公共設施</span>需要大家共同愛護。`,
                        infographic: `<div class="infographic"><div class="info-box"><span class="info-icon">🤝</span><strong>互相幫忙</strong><br>幫忙收信、關心</div><div class="info-box"><span class="info-icon">🏞️</span><strong>愛護公物</strong><br>維護公園整潔</div></div>`,
                        thinkBox: `🤔 腦力激盪：在電梯遇到鄰居，你應該怎麼做？<br>💡 解答：<span class="hover-reveal">主動微笑打招呼，展現禮貌！</span>`
                    }],
                    questions: [
                        { id: "u5_q1", text: "遇到鄰居時，下列哪一種行為最符合「敦親睦鄰」？", options: ["假裝沒看到", "微笑打招呼", "瞪他一眼", "馬上跑走"], answer: 1, explanation: "主動打招呼是建立良好鄰里關係的第一步。" }
                    ]
                }
            }
        };

        /* ================= MVC: Controller (邏輯層) ================= */
        let currentGrade = "grade3_term2";
        let currentUnit = "unit1";
        let quizPool = [];
        let ttsSpeaker = window.speechSynthesis;
        let currentUtterance = null;
        let activeTTSBtn = null;

        // 初始化
        function init() {
            populateUnitSelect();
            document.getElementById('unitSelect').addEventListener('change', (e) => {
                currentUnit = e.target.value;
                loadContent();
            });
            loadContent();
            renderMistakes();
        }

        // 載入單元選單
        function populateUnitSelect() {
            const unitSelect = document.getElementById('unitSelect');
            unitSelect.innerHTML = '';
            const units = knowledgeBase[currentGrade];
            for (let unitKey in units) {
                let option = document.createElement('option');
                option.value = unitKey;
                option.textContent = units[unitKey].title;
                unitSelect.appendChild(option);
            }
        }

        // 載入課程與題庫
        function loadContent() {
            stopTTS(); // 切換單元時停止語音
            const unitData = knowledgeBase[currentGrade][currentUnit];
            
            // 渲染微課程
            const lessonArea = document.getElementById('lessonArea');
            lessonArea.innerHTML = '';
            unitData.sections.forEach((sec, index) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'lesson-card';
                
                // 處理過濾隱藏文字的 TTS 內容
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = sec.content + sec.thinkBox;
                const hiddenElements = tempDiv.querySelectorAll('.hover-reveal');
                hiddenElements.forEach(el => el.remove());
                const textToRead = sec.title + "。 " + tempDiv.innerText;

                sectionDiv.innerHTML = `
                    <h3>${sec.title}</h3>
                    <button class="tts-btn" onclick="toggleTTS('${textToRead.replace(/\n/g, ' ')}', this)">🔊 唸課文給我聽</button>
                    <p>${sec.content}</p>
                    ${sec.infographic}
                    <div class="think-box">${sec.thinkBox}</div>
                `;
                lessonArea.appendChild(sectionDiv);
            });

            // 渲染題庫 (打亂順序，選出所有題目)
            quizPool = [...unitData.questions].sort(() => Math.random() - 0.5);
            renderQuiz();
        }

        // 渲染測驗區
        function renderQuiz() {
            const quizArea = document.getElementById('quizArea');
            quizArea.innerHTML = '';
            
            quizPool.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-card';
                qDiv.dataset.id = q.id;
                
                // 組合題目語音文字
                let qTextToRead = `第${index + 1}題。${q.text}。選項有：`;
                q.options.forEach((opt, i) => { qTextToRead += `${i+1}，${opt}。`; });

                let optionsHTML = q.options.map((opt, i) => `
                    <label class="option-label">
                        <input type="radio" name="q_${q.id}" value="${i}">
                        <span style="font-weight:bold; margin-right:8px;">${i + 1}.</span> ${opt}
                    </label>
                `).join('');

                qDiv.innerHTML = `
                    <div style="font-weight:bold; font-size:1.1rem; margin-bottom:10px;">
                        Q${index + 1}: ${q.text}
                        <button class="tts-btn" style="padding:4px 10px; font-size:0.8rem; margin-left:10px;" onclick="toggleTTS('${qTextToRead}', this)">🔊 唸題目</button>
                    </div>
                    <div class="options">${optionsHTML}</div>
                    <div class="feedback" id="feedback_${q.id}"></div>
                `;
                quizArea.appendChild(qDiv);
            });
        }

        // 批改答案
        function checkAnswers() {
            let allAnswered = true;
            quizPool.forEach(q => {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                const feedbackDiv = document.getElementById(`feedback_${q.id}`);
                
                if (!selected) {
                    allAnswered = false;
                    return;
                }

                const answerVal = parseInt(selected.value);
                if (answerVal === q.answer) {
                    feedbackDiv.className = 'feedback correct';
                    feedbackDiv.innerHTML = `✅ 答對了！`;
                } else {
                    feedbackDiv.className = 'feedback wrong';
                    feedbackDiv.innerHTML = `❌ 答錯囉！正確答案是 ${q.answer + 1}。<br>💡 說明：${q.explanation}`;
                    saveMistake(q);
                }
            });

            if (!allAnswered) {
                alert("👀 哎呀！還有題目沒有回答完喔！");
            } else {
                window.scrollTo({ top: document.getElementById('quizArea').offsetTop - 50, behavior: 'smooth' });
            }
        }

        // 重新出題
        function reloadQuiz() {
            if(confirm("確定要重新隨機出題嗎？目前的作答紀錄會清空喔！")) {
                loadContent();
            }
        }

        /* ================= 語音 (TTS) 功能 ================= */
        function toggleTTS(text, btnElement) {
            // 如果點擊的是同一個正在播放的按鈕
            if (activeTTSBtn === btnElement) {
                if (ttsSpeaker.speaking) {
                    if (ttsSpeaker.paused) {
                        ttsSpeaker.resume();
                        btnElement.classList.add('playing');
                        btnElement.innerHTML = btnElement.innerHTML.replace('暫停', '唸').replace('繼續', '暫停');
                    } else {
                        ttsSpeaker.pause();
                        btnElement.classList.remove('playing');
                        btnElement.innerHTML = btnElement.innerHTML.replace('唸', '繼續').replace('暫停', '繼續');
                    }
                    return;
                }
            }

            // 如果點擊了新的按鈕，先停止舊的
            stopTTS();
            
            activeTTSBtn = btnElement;
            btnElement.classList.add('playing');
            btnElement.innerHTML = btnElement.innerHTML.replace('唸', '暫停');

            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'zh-TW';
            currentUtterance.pitch = 1.0;
            currentUtterance.rate = 0.9; // 沉穩語速
            
            // 選擇女聲 (需視瀏覽器支援度)
            let voices = ttsSpeaker.getVoices();
            let femaleVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Female') || v.name.includes('Xiaoxiao')));
            if(femaleVoice) currentUtterance.voice = femaleVoice;

            currentUtterance.onend = () => {
                btnElement.classList.remove('playing');
                btnElement.innerHTML = btnElement.innerHTML.replace('暫停', '唸').replace('繼續', '唸');
                activeTTSBtn = null;
            };

            ttsSpeaker.speak(currentUtterance);
        }

        function stopTTS() {
            if (ttsSpeaker.speaking) {
                ttsSpeaker.cancel();
                if (activeTTSBtn) {
                    activeTTSBtn.classList.remove('playing');
                    activeTTSBtn.innerHTML = activeTTSBtn.innerHTML.replace('暫停', '唸').replace('繼續', '唸');
                    activeTTSBtn = null;
                }
            }
        }

        // 確保語音列表載入
        window.speechSynthesis.onvoiceschanged = () => { ttsSpeaker.getVoices(); };

        /* ================= 錯題區 (LocalStorage) ================= */
        function getStorageKey() {
            return `mistakes_${currentGrade}_${currentUnit}`;
        }

        function saveMistake(qObj) {
            const key = getStorageKey();
            let mistakes = JSON.parse(localStorage.getItem(key)) || [];
            // 防重複寫入
            if (!mistakes.find(m => m.id === qObj.id)) {
                mistakes.push(qObj);
                localStorage.setItem(key, JSON.stringify(mistakes));
                renderMistakes();
            }
        }

        function removeMistake(qId) {
            const key = getStorageKey();
            let mistakes = JSON.parse(localStorage.getItem(key)) || [];
            mistakes = mistakes.filter(m => m.id !== qId);
            localStorage.setItem(key, JSON.stringify(mistakes));
            renderMistakes();
        }

        function clearMistakes() {
            if(confirm("確定要清空這個單元所有的錯題嗎？")) {
                localStorage.removeItem(getStorageKey());
                renderMistakes();
            }
        }

        function renderMistakes() {
            const area = document.getElementById('mistakesArea');
            const key = getStorageKey();
            let mistakes = JSON.parse(localStorage.getItem(key)) || [];
            
            if (mistakes.length === 0) {
                area.innerHTML = '<p style="text-align:center; color:#7F8C8D;">太棒了！目前沒有錯題喔 🎉</p>';
                return;
            }

            area.innerHTML = '';
            mistakes.forEach(q => {
                const mDiv = document.createElement('div');
                mDiv.className = 'mistake-card';
                
                let qTextToRead = `錯題複習。${q.text}。正確答案是：${q.options[q.answer]}。說明：${q.explanation}`;

                mDiv.innerHTML = `
                    <button class="btn-learned" onclick="removeMistake('${q.id}')">✅ 我已經學會了</button>
                    <div style="font-weight:bold; margin-bottom:5px; padding-right:120px;">Q: ${q.text}</div>
                    <div style="color:#27AE60; font-weight:bold; margin-bottom:5px;">✓ 正確答案：${q.answer + 1}. ${q.options[q.answer]}</div>
                    <div style="color:#7F8C8D; font-size:0.9rem; margin-bottom:10px;">💡 說明：${q.explanation}</div>
                    <button class="tts-btn" style="padding:4px 10px; font-size:0.8rem;" onclick="toggleTTS('${qTextToRead}', this)">🔊 唸這題</button>
                `;
                area.appendChild(mDiv);
            });
        }

        // 啟動程式
        window.onload = init;
    </script>
</body>
</html>
