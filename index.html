<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 國小社會樂學網</title>
    <style>
        /* ================= CSS 樣式區 ================= */
        :root {
            --primary: #4A90E2;
            --secondary: #F39C12;
            --bg-color: #F4F7F6;
            --text-color: #333;
            --card-bg: #FFFFFF;
            --correct: #2ECC71;
            --wrong: #E74C3C;
        }

        body {
            font-family: 'Comic Sans MS', '微軟正黑體', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(#D5D8DC 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-color);
            line-height: 1.8;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            color: #333;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
            border-bottom: 4px solid white;
        }

        h1 { margin: 0; font-size: 1.6rem; font-weight: 900; color: #D81B60; text-shadow: 2px 2px 0px white; }

        .nav-controls select {
            padding: 10px 15px;
            border-radius: 25px;
            border: 3px solid #FFF;
            font-size: 1rem;
            margin-left: 10px;
            font-weight: bold;
            cursor: pointer;
            background-color: #FFF;
            color: var(--primary);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .nav-controls select:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.15); }

        .container { max-width: 950px; margin: 30px auto; padding: 0 20px; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.4rem;
            box-shadow: 0 4px 0 #2980B9;
        }

        .group-indicator {
            background: #E8F8F5;
            color: #16A085;
            border: 2px solid #1ABC9C;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            box-shadow: 0 3px 0 #A3E4D7;
        }

        .lesson-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-top: 8px solid var(--secondary);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .lesson-card h3 { color: #2C3E50; font-size: 1.5rem; margin-top: 0; border-bottom: 3px dashed #EEEEEE; padding-bottom: 10px; }

        .tts-btn {
            background-color: #E8F8F5; border: 2px solid #1ABC9C; color: #16A085; padding: 10px 18px;
            border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; box-shadow: 0 4px 0 #A3E4D7;
        }
        .tts-btn:hover { background-color: #1ABC9C; color: white; transform: translateY(-2px); box-shadow: 0 6px 0 #16A085; }
        .tts-btn:active { transform: translateY(2px); box-shadow: 0 0 0 transparent; }
        .tts-btn.playing { background-color: var(--secondary); border-color: #D68910; color: white; box-shadow: 0 4px 0 #B9770E; }

        .keyword { background-color: #FFF3CD; color: #D35400; padding: 2px 8px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; border-bottom: 3px solid #F39C12; display: inline-block; transform: rotate(-1deg); }
        .story-box { background: #F0F8FF; padding: 20px; border-radius: 15px; border-left: 6px solid #5DADE2; margin: 15px 0; font-size: 1.1rem; }
        .infographic { display: flex; gap: 20px; margin: 25px 0; justify-content: center; flex-wrap: wrap; }
        .info-box { flex: 1; min-width: 200px; background: #FFF; border: 3px solid #EAEDED; border-radius: 15px; text-align: center; padding: 20px; font-size: 1.1rem; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.3s; }
        .info-box:hover { transform: translateY(-5px) scale(1.02); border-color: var(--primary); }
        .info-box.vs::after { content: "VS"; position: absolute; right: -25px; top: 50%; transform: translateY(-50%); background: #E74C3C; color: white; border-radius: 50%; width: 40px; height: 40px; line-height: 40px; font-weight: 900; font-size: 1.1rem; z-index: 1; box-shadow: 0 3px 0 #C0392B; }
        .info-box:last-child::after { display: none; }
        .info-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .think-box { background-color: #FDEDEC; border: 3px dashed #E74C3C; padding: 20px; border-radius: 15px; margin-top: 25px; font-size: 1.1rem; }
        .hover-reveal { background-color: #BDC3C7; color: #BDC3C7; border-radius: 8px; padding: 4px 12px; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; display: inline-block; }
        .hover-reveal:hover, .hover-reveal.revealed { background-color: #D4EDDA; color: #155724; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .quiz-container { margin-top: 40px; }
        .question-card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); border-left: 8px solid var(--primary); animation: popIn 0.5s ease-out forwards; }
        .question-text { font-weight: 900; font-size: 1.25rem; margin-bottom: 15px; color: #2C3E50; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        .option-label { display: flex; align-items: center; background: #F8F9F9; padding: 15px; border-radius: 12px; cursor: pointer; border: 3px solid #E5E7E9; transition: all 0.2s; font-size: 1.1rem; font-weight: bold; color: #566573; }
        .option-label:hover { border-color: var(--primary); background: #EBF5FB; transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .option-label input { margin-right: 15px; transform: scale(1.5); cursor: pointer; accent-color: var(--primary); }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-weight: bold; font-size: 1.1rem; animation: popIn 0.3s ease-out; }
        .feedback.correct { background: #D4EDDA; color: #155724; border-left: 5px solid var(--correct); display: block; }
        .feedback.wrong { background: #F8D7DA; color: #721C24; border-left: 5px solid var(--wrong); display: block; }

        .action-btns { text-align: center; margin: 40px 0; }
        .btn { padding: 15px 35px; font-size: 1.3rem; border: none; border-radius: 30px; cursor: pointer; font-weight: 900; box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: 0.1s; display: inline-flex; align-items: center; gap: 10px; }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .btn-submit { background-color: var(--primary); color: white; box-shadow: 0 6px 0 #2980B9; }
        .btn-next-group { background-color: #9B59B6; color: white; margin-left: 15px; box-shadow: 0 6px 0 #8E44AD; }
        .btn-clear { background-color: #E74C3C; color: white; box-shadow: 0 4px 0 #C0392B; }

        .mistake-card { background: #FFF9E6; border: 3px solid #F1C40F; border-left: 10px solid #F1C40F; padding: 20px; border-radius: 15px; margin-bottom: 20px; position: relative; animation: popIn 0.4s ease-out; }
        .btn-learned { background-color: var(--correct); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; position: absolute; right: 15px; bottom: 15px; font-weight: bold; box-shadow: 0 4px 0 #27AE60; transition: 0.1s; }
        .btn-learned:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <header>
        <h1>🎮 國小社會魔法學院</h1>
        <div class="nav-controls">
            <select id="gradeSelect">
                <option value="grade3_term2">三年級 (下學期)</option>
            </select>
            <select id="unitSelect">
                </select>
        </div>
    </header>

    <div class="container">
        <div class="section-title">📖 探險微課程</div>
        <div id="lessonArea"></div>

        <div class="section-header">
            <div class="section-title" style="background:var(--secondary); box-shadow: 0 4px 0 #D68910; margin-bottom:0;">🏆 隨堂大挑戰</div>
            <div class="group-indicator" id="groupIndicator">目前進度：第 1 組</div>
        </div>
        
        <div id="quizArea"></div>
        <div class="action-btns">
            <button class="btn btn-submit" onclick="checkAnswers()">🚀 送出我的答案</button>
            <button class="btn btn-next-group" onclick="nextQuestionGroup()">⏭️ 挑戰下一組題目</button>
        </div>

        <div class="section-title" style="background:#8E44AD; box-shadow: 0 4px 0 #732D91;">💪 我的修練筆記 (錯題區)</div>
        <div class="action-btns" style="text-align: right; margin-top: -65px; margin-bottom: 20px;">
            <button class="btn btn-clear" style="padding: 8px 20px; font-size: 1rem;" onclick="clearMistakes()">🗑️ 魔法大掃除(清空)</button>
        </div>
        <div id="mistakesArea"></div>
    </div>

    <script>
        /* ================= MVC: Model (資料層) ================= */
        // 注意：現在每個單元使用 questionGroups 陣列，裡面包含 5 個陣列（組別 1~5）
        const knowledgeBase = {
            grade3_term2: {
                unit1: {
                    title: "第一單元：生活理財大師",
                    sections: [
                        {
                            title: "第1課：理性消費你我他 🛒",
                            content: `<div class="story-box">👦 <strong>主角小豆子的故事：</strong><br>星期天，小豆子跟媽媽去超級市場。小豆子的水壺破洞了，所以必須買一個新水壺。但是經過玩具區時，小豆子看到最新款的變形機器人，拉著媽媽的手說：「哇！我好想要這個喔！」</div>故事中，買新水壺是因為沒有它就沒辦法喝水，這叫做<span class="keyword">需要</span>。變形機器人只是為了一時開心，這叫做<span class="keyword">想要</span>。<br><strong>💡 知識小超人說：</strong>先滿足需要，再考慮想要，這就是<strong>理性消費</strong>！`,
                            infographic: `<div class="infographic"><div class="info-box vs"><span class="info-icon">💧</span><strong style="color:#2980B9;">「需要」的物品</strong></div><div class="info-box"><span class="info-icon">🎮</span><strong style="color:#C0392B;">「想要」的物品</strong></div></div>`,
                            thinkBox: `🤔 <strong>腦力激盪時間：</strong>冬天超級冷，小豆子買了一件厚外套。請問這是需要還是想要？<br>💡 魔法解答區：<span class="hover-reveal">是「需要」！因為不穿厚外套會感冒生病喔！</span>`
                        },
                        {
                            title: "第2課：小豬撲滿的秘密 (儲蓄與記帳) 🐷",
                            content: `<div class="story-box">💰 <strong>小豆子的夢想：</strong><br>小豆子超級想買一台腳踏車，可是腳踏車很貴，他的零用錢不夠。爸爸笑著給了他一本小本子和一隻小豬撲滿，告訴他：「學會這兩招，夢想就能實現喔！」</div>第一招叫做<span class="keyword">儲蓄</span>，就是忍住把錢花光光的衝動，把剩下的錢放進撲滿裡存起來。<br>第二招叫做<span class="keyword">記帳</span>，就像是幫金錢寫日記。拿到零用錢叫做「收入」，買文具花掉的錢叫做「支出」，最後剩下的錢叫做「結餘」。`,
                            infographic: `<div class="infographic"><div class="info-box" style="background:#FEF9E7; border-color:#F1C40F;"><strong style="color:#D68910; font-size:1.2rem;">小超人的記帳公式</strong><div style="text-align:left; margin-top:15px; font-size:1.1rem; background:white; padding:10px; border-radius:10px;">➕ <strong>收入：</strong> 得到的錢<br>➖ <strong>支出：</strong> 花掉的錢<br><hr>🟰 <strong>結餘：</strong> 剩下的錢</div></div></div>`,
                            thinkBox: `🤔 <strong>金頭腦算一算：</strong>小豆子這個月拿到 500 元零用錢，他買了一盒 100 元的彩色筆。請問他的「結餘」是多少錢？<br>💡 魔法解答區：<span class="hover-reveal">500(收入) - 100(支出) = 400(結餘)。</span>`
                        }
                    ],
                    // 分為 5 組，每組 10 題
                    questionGroups: [
                        [ // 第 1 組 (1-10題)
                            { id: "u1_g1_q1", text: "下列哪一個物品屬於維持生活「需要」的東西？", options: ["最新款的遊戲機", "每天喝的水", "遊樂園的門票", "好吃的巧克力"], answer: 1, explanation: "水是維持生命所必需的，屬於「需要」。" },
                            { id: "u1_g1_q2", text: "買東西前，我們應該優先購買哪一種物品？", options: ["想要的", "需要的", "包裝漂亮的", "同學都有的"], answer: 1, explanation: "理性消費的第一步是先滿足生活「需要」，再考慮「想要」。" },
                            { id: "u1_g1_q3", text: "小華把這個月剩下的零用錢存進小豬撲滿裡，這個行為稱為什麼？", options: ["記帳", "消費", "儲蓄", "投資"], answer: 2, explanation: "把剩下的錢存起來以備不時之需，這個行為叫做「儲蓄」。" },
                            { id: "u1_g1_q4", text: "「記帳」最主要的好處是什麼？", options: ["可以跟父母要更多錢", "了解自己的金錢流向", "能馬上買到想要的玩具", "讓錢自動變多"], answer: 1, explanation: "記帳可以幫我們清楚記錄收入和支出，了解錢花在哪裡。" },
                            { id: "u1_g1_q5", text: "下列哪一種消費行為最符合「理性消費」？", options: ["看到喜歡的就買", "買東西前先列清單", "花光所有的零用錢", "只要特價就全買回家"], answer: 1, explanation: "購物前列出清單，可以避免衝動購物，是理性消費的表現。" },
                            { id: "u1_g1_q6", text: "小美的鉛筆盒壞了不能用，她去文具店買了一個新的。請問新鉛筆盒是？", options: ["需要", "想要", "浪費", "儲蓄"], answer: 0, explanation: "因為舊的壞了影響學習，所以買新鉛筆盒是學習的「需要」。" },
                            { id: "u1_g1_q7", text: "記帳的時候，如果阿公給了你 100 元，這筆錢應該記在？", options: ["支出", "收入", "結餘", "想要"], answer: 1, explanation: "別人給予或是自己賺到的錢，都屬於「收入」。" },
                            { id: "u1_g1_q8", text: "如果我們想要買一個很貴的腳踏車，最好的方法是？", options: ["吵著要爸媽買", "去跟同學借錢", "訂定目標並開始儲蓄", "放棄永遠不要買"], answer: 2, explanation: "透過計畫性的儲蓄，可以慢慢累積金錢達成夢想。" },
                            { id: "u1_g1_q9", text: "天氣變冷了，小光買了一件保暖的外套。請問這件外套是？", options: ["需要", "想要", "浪費", "借來的"], answer: 0, explanation: "為了保暖不感冒，外套是生活上的「需要」。" },
                            { id: "u1_g1_q10", text: "下列哪一個不是我們儲蓄的目的？", options: ["為了買未來的夢想物品", "應付突然生病看醫生的錢", "為了每天買很多零食吃", "為了未來學習的基金"], answer: 2, explanation: "每天買零食花掉錢是消費，不是儲蓄的目的。" }
                        ],
                        [ // 第 2 組 (11-20題)
                            { id: "u1_g2_q1", text: "在記帳本中，「結餘」的意思是什麼？", options: ["花掉的錢", "得到的錢", "收入減去支出的錢", "想買的東西的價錢"], answer: 2, explanation: "結餘 = 收入 - 支出，代表你現在手邊還剩下的錢。" },
                            { id: "u1_g2_q2", text: "逛超市時，遇到「買一送一」的促銷，我們應該怎麼做？", options: ["不管需不需要都買", "先想清楚家裡需不需要", "全部買下來再丟掉", "把錢全部花光"], answer: 1, explanation: "遇到促銷也要保持冷靜，評估是否真正「需要」才不會浪費。" },
                            { id: "u1_g2_q3", text: "小亮這個月的零用錢有 500 元，花了 300 元買文具，結餘是多少？", options: ["800元", "300元", "200元", "500元"], answer: 2, explanation: "500(收入) - 300(支出) = 200(結餘)。" },
                            { id: "u1_g2_q4", text: "當「想要」的東西很多，但錢不夠時，應該怎麼辦？", options: ["偷拿別人的錢", "分出輕重緩急，先買最重要的", "大哭大鬧", "跟老闆說賒帳"], answer: 1, explanation: "資源有限時，要學會排序，選擇最重要或最需要的優先。" },
                            { id: "u1_g2_q5", text: "下列哪一種是幫助我們控制花費的好工具？", options: ["電視", "記帳本", "故事書", "電動玩具"], answer: 1, explanation: "記帳本可以幫助我們追蹤金錢流向，控制花費。" },
                            { id: "u1_g2_q6", text: "小明發現同樣的鞋子在網路上比較便宜。為了省錢他在網路購買，這稱為什麼？", options: ["浪費時間", "貨比三家", "衝動購物", "不想出門"], answer: 1, explanation: "買東西前多比較價格，找出最划算的選擇，這叫做「貨比三家」。" },
                            { id: "u1_g2_q7", text: "下列哪一種情況最可能是因為「沒有記帳」造成的？", options: ["零用錢突然變多", "不知道錢花去哪裡，月底就沒錢了", "考試考一百分", "撲滿滿出來了"], answer: 1, explanation: "沒有記帳就無法掌握金錢的流向，很容易不知不覺就把錢花光了。" },
                            { id: "u1_g2_q8", text: "為了避免去超市買了太多「想要」但不「需要」的東西，出門前最好怎麼做？", options: ["帶很多很多錢", "把眼睛矇起來", "寫好購物清單", "餓著肚子去"], answer: 2, explanation: "寫好購物清單並嚴格遵守，可以有效防止衝動購物。" },
                            { id: "u1_g2_q9", text: "如果發現自己這個月的「支出」大於「收入」，代表什麼意思？", options: ["錢越變越多", "變成大富翁了", "入不敷出（錢不夠花）", "記帳本壞掉了"], answer: 2, explanation: "花掉的錢（支出）比得到的錢（收入）還要多，就叫做入不敷出。" },
                            { id: "u1_g2_q10", text: "爸爸發薪水時，會先固定把 3000 元存進銀行，剩下的才拿來當生活費。這是什麼好習慣？", options: ["先儲蓄後消費", "先消費後儲蓄", "亂花錢", "跟銀行借錢"], answer: 0, explanation: "拿到錢先強制存下一筆金額，確保每個月都有儲蓄，是很好的理財觀念。" }
                        ],
                        [], // 第 3 組 (待擴充)
                        [], // 第 4 組 (待擴充)
                        []  // 第 5 組 (待擴充)
                    ]
                },
                unit2: {
                    title: "第二單元：居住的地方 🏡",
                    sections: [
                        {
                            title: "第1課：認識居住的地方 🌳",
                            content: `<div class="story-box">👦 <strong>小豆子的社區探險：</strong><br>小豆子帶著望遠鏡在家附近探險。他看到社區後面有一座綠油油的小山丘和彎彎的小河；社區前面則有便利商店、柏油路和一間大廟。</div>我們居住的地方包含了兩種環境：大自然原本就有的叫做<span class="keyword">自然環境</span>（例如山丘、小河）；人類為了生活方便而建造的叫做<span class="keyword">人文環境</span>（例如道路、商店、廟宇）。`,
                            infographic: `<div class="infographic"><div class="info-box vs" style="border-color:#27AE60;"><span class="info-icon">⛰️</span><strong style="color:#27AE60;">自然環境</strong></div><div class="info-box" style="border-color:#8E44AD;"><span class="info-icon">🏫</span><strong style="color:#8E44AD;">人文環境</strong></div></div>`,

                        {

                            content: `<div class="story-box">👴 <strong>小豆子問爺爺：</strong><br>小豆子想知道家鄉以前長什麼樣子。爺爺拿出了一張舊地圖，並跟小豆子說了好多以前在這裡蓋房子的故事。</div>要認識居住的地方，我們可以透過<span class="keyword">訪問長輩</span>來了解以前的故事，也可以利用<span class="keyword">地圖</span>來清楚知道街道、學校和河川的位置。現在我們還能上網查詢資料呢！`,
                            infographic: `<div class="infographic"><div class="info-box" style="background:#FEF9E7;"><strong style="color:#D68910;">🔍 探索家鄉三法寶</strong><div style="text-align:left; margin-top:10px; font-size:1rem; background:white; padding:10px; border-radius:10px;">🗺️ 看地圖<br>👴 問長輩<br>💻 查網路</div></div></div>`,
                            thinkBox: `🤔 <strong>腦力激盪：</strong>如果小豆子想知道怎麼從家裡最快走到圖書館，他應該用哪一個法寶？<br>💡 魔法解答區：<span class="hover-reveal">使用「地圖」或手機導航，可以最快看出街道的路線！</span>`
                        }
                    ],
                    questionGroups: [
                        [ // 第 1 組
                            { id: "u2_g1_q1", text: "下列哪一個屬於「自然環境」？", options: ["便利商店", "高速公路", "天然的河流", "圖書館"], answer: 2, explanation: "河流是大自然產生的，屬於自然環境。" },
                            { id: "u2_g1_q2", text: "下列哪一個屬於「人文環境」？", options: ["高山", "學校", "森林", "海洋"], answer: 1, explanation: "學校是人類為了教育而建造的，屬於人文環境。" },
                            { id: "u2_g1_q3", text: "要想知道家鄉以前的樣子，最好的方法是？", options: ["問外星人", "訪問地方上的長輩", "看昨天的報紙", "查字典"], answer: 1, explanation: "地方耆老(長輩)了解家鄉歷史，是很好的訪問對象。" },
                            { id: "u2_g1_q4", text: "我們可以利用什麼工具來快速了解家鄉的街道分布？", options: ["溫度計", "體重計", "地圖", "時鐘"], answer: 2, explanation: "地圖可以顯示地形、道路等空間資訊。" },
                            { id: "u2_g1_q5", text: "保護居住環境是誰的責任？", options: ["只有里長", "只有警察", "只有大人", "每一個居民"], answer: 3, explanation: "維護環境是所有居民共同的責任。" },
                            { id: "u2_g1_q6", text: "家鄉的「廟宇」或「教堂」屬於哪一種環境？", options: ["自然環境", "人文環境", "太空環境", "虛擬環境"], answer: 1, explanation: "這些是人類為了宗教信仰所建造的建築，屬於人文環境。" },
                            { id: "u2_g1_q7", text: "小明想畫一張家鄉的尋寶圖，請問這張圖最像我們生活中的什麼工具？", options: ["日曆", "課本", "地圖", "字典"], answer: 2, explanation: "尋寶圖會標示出路線和地點，和地圖的功能最相似。" },
                            { id: "u2_g1_q8", text: "下列哪一種不屬於認識居住地方的好方法？", options: ["到圖書館查資料", "實地去走訪觀察", "隨便聽別人亂說", "訪問社區的村里長"], answer: 2, explanation: "隨便聽信謠言可能會得到錯誤的資訊，應該查證或詢問專業人士。" },
                            { id: "u2_g1_q9", text: "關於自然環境與人文環境的關係，哪一個說法是正確的？", options: ["人文環境越少越好", "兩者會互相影響", "自然環境會自己變成房子", "兩者完全沒有關係"], answer: 1, explanation: "人類會在自然環境中建造房屋，同時也需要保護自然環境，兩者息息相關。" },
                            { id: "u2_g1_q10", text: "去訪問長輩家鄉歷史前，我們應該先做什麼準備？", options: ["準備好要問的問題", "帶電動玩具去打", "準備睡覺", "什麼都不用準備"], answer: 0, explanation: "訪問前應該先列好訪綱（要問的問題），才是有禮貌且有效率的做法。" }
                        ],
                        [ // 第 2 組
                            { id: "u2_g2_q1", text: "下列哪一個是我們每天上學會經過的「人文環境」？", options: ["天上的白雲", "柏油馬路", "吹過的微風", "早上的太陽"], answer: 1, explanation: "馬路是人類鋪設出來供車輛行走的，是人文環境。" },
                            { id: "u2_g2_q2", text: "發現社區公園的溜滑梯壞了，我們應該怎麼辦？", options: ["假裝沒看到", "繼續玩到它完全壞掉", "請大人通知里長或區公所修理", "自己拿膠水黏起來"], answer: 2, explanation: "公共設施損壞應該通報相關單位來進行專業維修，以確保安全。" },
                            { id: "u2_g2_q3", text: "為什麼我們需要認識自己居住的地方？", options: ["因為考試會考", "為了能更好地愛護與關心家鄉", "為了能找到藏寶圖", "因為無聊"], answer: 1, explanation: "了解家鄉才能產生認同感，進而一起保護和讓社區變得更好。" },
                            { id: "u2_g2_q4", text: "下列哪一個地方可以查到最正確的家鄉人口和面積資料？", options: ["故事書", "漫畫書", "區公所的網站", "便利商店"], answer: 2, explanation: "政府機關（如區公所、戶政事務所）的網站會有最準確的官方統計資料。" },
                            { id: "u2_g2_q5", text: "小美的家鄉四面環海，居民大多捕魚維生。請問影響他們生活方式的最大因素是什麼？", options: ["天氣太熱", "自然環境(海洋)", "人文環境(學校)", "地圖畫錯了"], answer: 1, explanation: "四面環海屬於自然環境，這直接影響了當地居民選擇捕魚作為生活方式。" },
                            { id: "u2_g2_q6", text: "阿嬤說以前家門前是一條小溪，現在卻變成馬路。這說明了什麼？", options: ["阿嬤記錯了", "人文環境改變了自然環境", "小溪自己會變魔術", "馬路是自然長出來的"], answer: 1, explanation: "人類為了交通便利將小溪填平鋪成馬路，這是人文環境改變自然環境的例子。" },
                            { id: "u2_g2_q7", text: "繪製一張簡單的「社區逃生路線圖」，圖上最不應該出現什麼資訊？", options: ["滅火器的位置", "逃生出口的方向", "你最喜歡的玩具藏在哪裡", "社區管理室的電話"], answer: 2, explanation: "逃生圖應該以安全資訊為主，私人物品的位置會干擾逃生路線的判讀。" },
                            { id: "u2_g2_q8", text: "訪問長輩時，如果長輩講到其他不相關的事情，你應該怎麼做？", options: ["大聲叫他閉嘴", "直接走掉不聽了", "耐心聆聽，再禮貌地把話題帶回來", "跟他一起聊電動"], answer: 2, explanation: "訪問長輩要有耐心與禮貌，適時地引導話題才是好的訪問技巧。" },
                            { id: "u2_g2_q9", text: "有些山區在颱風天容易發生土石流，這可能是因為人類過度開發。這告訴我們什麼道理？", options: ["果樹種越多越好", "破壞自然環境最後會危害到人類自己", "颱風喜歡果樹", "房子蓋在山上比較安全"], answer: 1, explanation: "過度開發人文環境會破壞自然環境的平衡（水土保持），導致災害發生。" },
                            { id: "u2_g2_q10", text: "在網路上發現有兩個網站對家鄉的歷史介紹不一樣。你應該怎麼辦？", options: ["隨便選一個抄", "兩個都不要相信", "尋找政府官方網站或圖書館的書籍來確認", "自己編一個故事"], answer: 2, explanation: "遇到資料衝突時應該尋求更具權威性的來源（如官方或學術書籍）來查證。" }
                        ],
                        [], [], []
                    ]
                },
                // (由於版面限制，單元 3, 4, 5 請比照上述格式，將原本的 20 題分為兩組放進 questionGroups 陣列中。這裡為了程式完整性，我先建立空殼，你可以直接貼上前一版的題目)
                unit3: { title: "第三單元：地名的魔法故事 📜", sections: [], questionGroups: [[], [], [], [], []] },
                unit4: { title: "第四單元：家鄉的尋寶之旅 🎁", sections: [], questionGroups: [[], [], [], [], []] },
                unit5: { title: "第五單元：地方生活好鄰居 🤝", sections: [], questionGroups: [[], [], [], [], []] }
            }
        };

        /* ================= MVC: Controller (邏輯層) ================= */
        let currentGrade = "grade3_term2";
        let currentUnit = "unit1";
        // 新增狀態變數：記錄當前挑戰到哪一組 (0-4)
        let currentGroupIndex = 0; 
        
        let quizPool = [];
        let ttsSpeaker = window.speechSynthesis;
        let currentUtterance = null;
        let activeTTSBtn = null;

        function init() {
            populateUnitSelect();
            document.getElementById('unitSelect').addEventListener('change', (e) => {
                currentUnit = e.target.value;
                currentGroupIndex = 0; // 切換單元時，重置為第 1 組
                loadContent();
            });
            loadContent();
            renderMistakes();
        }

        function populateUnitSelect() {
            const unitSelect = document.getElementById('unitSelect');
            unitSelect.innerHTML = '';
            const units = knowledgeBase[currentGrade];
            for (let unitKey in units) {
                let option = document.createElement('option');
                option.value = unitKey;
                option.textContent = units[unitKey].title;
                unitSelect.appendChild(option);
            }
        }

        function loadContent() {
            stopTTS(); 
            const unitData = knowledgeBase[currentGrade][currentUnit];
            
            // 渲染微課程
            const lessonArea = document.getElementById('lessonArea');
            lessonArea.innerHTML = '';
            if(unitData.sections && unitData.sections.length > 0) {
                unitData.sections.forEach((sec) => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'lesson-card';
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = sec.content + sec.thinkBox;
                    const hiddenElements = tempDiv.querySelectorAll('.hover-reveal');
                    hiddenElements.forEach(el => el.remove());
                    const textToRead = sec.title + "。 " + tempDiv.innerText;

                    sectionDiv.innerHTML = `
                        <h3>${sec.title}</h3>
                        <button class="tts-btn" onclick="toggleTTS('${textToRead.replace(/\n/g, ' ')}', this)">🔊 呼叫語音小幫手</button>
                        <div>${sec.content}</div>
                        ${sec.infographic}
                        <div class="think-box">${sec.thinkBox}</div>
                    `;
                    lessonArea.appendChild(sectionDiv);
                });
            }

            // 更新組別指示器
            document.getElementById('groupIndicator').innerText = `目前進度：第 ${currentGroupIndex + 1} 組`;

            // 抓取對應組別的題目
            const currentGroupQuestions = unitData.questionGroups[currentGroupIndex] || [];
            
            // 如果該組沒有題目，顯示提示
            if(currentGroupQuestions.length === 0) {
                document.getElementById('quizArea').innerHTML = `<p style="text-align:center; color:#7F8C8D; font-size:1.2rem; background:white; padding:20px; border-radius:15px;">🚧 這一組的題目還在建設中，請點擊「挑戰下一組題目」或擴充題庫喔！</p>`;
                quizPool = [];
                return;
            }

            // 載入該組的 10 題 (不打亂順序，依照陣列原本排序)
            quizPool = [...currentGroupQuestions];
            renderQuiz();
        }

        function renderQuiz() {
            const quizArea = document.getElementById('quizArea');
            quizArea.innerHTML = '';
            
            quizPool.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-card';
                qDiv.dataset.id = q.id;
                
                let qTextToRead = `第${index + 1}題。${q.text}。選項有：`;
                q.options.forEach((opt, i) => { qTextToRead += `${i+1}，${opt}。`; });

                let optionsHTML = q.options.map((opt, i) => `
                    <label class="option-label">
                        <input type="radio" name="q_${q.id}" value="${i}">
                        <span>${i + 1}. ${opt}</span>
                    </label>
                `).join('');

                qDiv.innerHTML = `
                    <div class="question-text">
                        <span style="color:var(--primary);">Q${index + 1}:</span> ${q.text}
                        <button class="tts-btn" style="padding:4px 12px; font-size:0.9rem; margin-left:10px; box-shadow: 0 3px 0 #A3E4D7; border-radius:15px;" onclick="toggleTTS('${qTextToRead}', this)">🔊 唸題目</button>
                    </div>
                    <div class="options">${optionsHTML}</div>
                    <div class="feedback" id="feedback_${q.id}"></div>
                `;
                quizArea.appendChild(qDiv);
            });
        }

        function checkAnswers() {
            if (quizPool.length === 0) return;

            let allAnswered = true;
            quizPool.forEach(q => {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                const feedbackDiv = document.getElementById(`feedback_${q.id}`);
                
                if (!selected) {
                    allAnswered = false;
                    return;
                }

                const answerVal = parseInt(selected.value);
                if (answerVal === q.answer) {
                    feedbackDiv.className = 'feedback correct';
                    feedbackDiv.innerHTML = `🎉 太棒了！答對囉！`;
                } else {
                    feedbackDiv.className = 'feedback wrong';
                    feedbackDiv.innerHTML = `😢 哎呀！答錯囉。正確答案是 <strong>${q.answer + 1}</strong>。<br>💡 魔法詳解：${q.explanation}`;
                    saveMistake(q);
                }
            });

            if (!allAnswered) {
                alert("👀 偵探小豆子發現：還有題目沒有回答完喔！");
            } else {
                window.scrollTo({ top: document.getElementById('quizArea').offsetTop - 50, behavior: 'smooth' });
            }
        }

        // 新功能：挑戰下一組題目 (循環 1~5)
        function nextQuestionGroup() {
            if(confirm("確定要挑戰下一組題目嗎？目前的作答紀錄會清空喔！")) {
                // 將索引值加 1，如果超過 4 (也就是第 5 組)，就用 % 5 取餘數回到 0 (也就是第 1 組)
                currentGroupIndex = (currentGroupIndex + 1) % 5;
                loadContent();
                
                // 將畫面捲動到測驗區標題
                window.scrollTo({ top: document.getElementById('quizArea').offsetTop - 100, behavior: 'smooth' });
            }
        }

        function toggleTTS(text, btnElement) {
            if (activeTTSBtn === btnElement && ttsSpeaker.speaking) {
                if (ttsSpeaker.paused) { ttsSpeaker.resume(); btnElement.classList.add('playing'); } 
                else { ttsSpeaker.pause(); btnElement.classList.remove('playing'); }
                return;
            }
            stopTTS();
            activeTTSBtn = btnElement;
            btnElement.classList.add('playing');
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'zh-TW';
            currentUtterance.pitch = 1.0;
            currentUtterance.rate = 0.9;
            currentUtterance.onend = () => { btnElement.classList.remove('playing'); activeTTSBtn = null; };
            ttsSpeaker.speak(currentUtterance);
        }

        function stopTTS() {
            if (ttsSpeaker.speaking) { ttsSpeaker.cancel(); if (activeTTSBtn) { activeTTSBtn.classList.remove('playing'); activeTTSBtn = null; } }
        }

        function getStorageKey() { return `mistakes_${currentGrade}_${currentUnit}`; }
        
        function saveMistake(qObj) {
            const key = getStorageKey();
            let mistakes = JSON.parse(localStorage.getItem(key)) || [];
            if (!mistakes.find(m => m.id === qObj.id)) { mistakes.push(qObj); localStorage.setItem(key, JSON.stringify(mistakes)); renderMistakes(); }
        }
        
        function removeMistake(qId) {
            const key = getStorageKey();
            let mistakes = JSON.parse(localStorage.getItem(key)) || [];
            mistakes = mistakes.filter(m => m.id !== qId);
            localStorage.setItem(key, JSON.stringify(mistakes));
            renderMistakes();
        }
        
        function clearMistakes() {
            if(confirm("確定要清空這個單元所有的錯題筆記嗎？")) { localStorage.removeItem(getStorageKey()); renderMistakes(); }
        }

        function renderMistakes() {
            const area = document.getElementById('mistakesArea');
            let mistakes = JSON.parse(localStorage.getItem(getStorageKey())) || [];
            if (mistakes.length === 0) { area.innerHTML = '<p style="text-align:center; color:#7F8C8D; font-size:1.2rem; background:white; padding:20px; border-radius:15px;">太棒了！目前沒有錯題筆記喔 🎉 繼續保持！</p>'; return; }
            area.innerHTML = '';
            mistakes.forEach(q => {
                const mDiv = document.createElement('div');
                mDiv.className = 'mistake-card';
                let qTextToRead = `錯題複習。${q.text}。正確答案是：${q.options[q.answer]}。說明：${q.explanation}`;
                mDiv.innerHTML = `
                    <button class="btn-learned" onclick="removeMistake('${q.id}')">✅ 我已經學會了</button>
                    <div style="font-weight:900; font-size:1.1rem; margin-bottom:8px; padding-right:120px; color:#2C3E50;">Q: ${q.text}</div>
                    <div style="color:#27AE60; font-weight:bold; margin-bottom:8px;">✓ 正確答案：${q.answer + 1}. ${q.options[q.answer]}</div>
                    <div style="color:#7F8C8D; font-size:1rem; margin-bottom:15px; background:white; padding:10px; border-radius:8px;">💡 魔法詳解：${q.explanation}</div>
                    <button class="tts-btn" style="padding:6px 15px; font-size:0.9rem; margin:0;" onclick="toggleTTS('${qTextToRead}', this)">🔊 唸這題給我聽</button>
                `;
                area.appendChild(mDiv);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
